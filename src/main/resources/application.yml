server:
  port: ${PORT:8080}
  forward-headers-strategy: framework
  error:
    include-message: always
    include-stacktrace: never

spring:
  application:
    name: honcho-inspector-backend
  config:
    # Build-info.properties is generated by the exec-maven-plugin at
    # prepare-package time (writes git rev-parse + timestamp into the
    # jar). Spring imports it here so honcho.build.commit / .timestamp
    # resolve to the values baked at package time rather than the
    # default "local" / empty fallbacks declared inline below.
    import: classpath:build-info.properties
  jackson:
    default-property-inclusion: non_null
  threads:
    virtual:
      enabled: false
  datasource:
    # SQLite. Use a file path; for tests, override with jdbc:sqlite::memory: (no shared in-mem db between connections).
    # Default puts the db in the resolved honcho-inspector config dir, e.g. /etc/honcho-inspector/honcho-inspector.db on Linux.
    url: ${HONCHO_DB_PATH:jdbc:sqlite:${HONCHO_DB_FILE:honcho-inspector.db}}
    driver-class-name: org.sqlite.JDBC
    hikari:
      maximum-pool-size: 1
      minimum-idle: 1
      connection-init-sql: "PRAGMA foreign_keys = ON"
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      continue-on-error: false
  jpa:
    # 'validate' makes Hibernate verify the entities match the existing
    # schema (column names + types) at startup, but never silently
    # mutate the database. The schema is owned by schema.sql and
    # applied by spring.sql.init above; JPA only reads from it.
    hibernate:
      ddl-auto: validate
    # The community SQLite dialect is the only one that maps
    # @Column types onto a SQLite-flavored schema without choking on
    # TEXT-as-varchar and INTEGER-as-boolean. It's pulled in via
    # pom.xml.
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    open-in-view: false
    properties:
      hibernate.format_sql: false
      hibernate.show_sql: false

# Honcho upstream. The base URL is also accepted per-login via the LoginInput,
# but these defaults are used for the startup banner and any default-fallback calls.
honcho:
  # Build-time identifiers surfaced via X-Honcho-Inspector-Build /
  # X-Honcho-Inspector-Version response headers. Default values are
  # safe for a developer machine; pass -Dbuild.commit=... -Dbuild.timestamp=...
  # at the mvn command line to bake a real value into the jar at package time.
  build:
    commit: ${build.commit:local}
    timestamp: ${build.timestamp:}
  base-url: ${HONCHO_BASE_URL:https://api.honcho.dev}
  api-version: ${HONCHO_API_VERSION:v3}
  request-timeout-ms: ${HONCHO_REQUEST_TIMEOUT_MS:30000}
  # OS-aware default config dir, used by HonchoConfigDirResolver.
  config-dir: ${HONCHO_CONFIG_DIR:#{null}}
  # Provider strict-mode (default false). When true, the server fails to start if any registered
  # HonchoProvider claims a version that has no HonchoClient implementation. Set true in prod
  # to prevent forward-incompatible deploys.
  providers:
    strict-mode: false
  # Bootstrap admin. On first startup (users table empty), if BOTH username AND
  # password are set, an admin user is created. Leave blank to disable. Put
  # real values in /etc/honcho-inspector/application.yml on deployed systems;
  # this block ships blank so the bundled jar cannot accidentally create an
  # admin with a known password.
  bootstrap:
    admin-username: ${HONCHO_BOOTSTRAP_ADMIN_USERNAME:}
    admin-password: ${HONCHO_BOOTSTRAP_ADMIN_PASSWORD:}
    admin-firstname: ${HONCHO_BOOTSTRAP_ADMIN_FIRSTNAME:}
    admin-lastname: ${HONCHO_BOOTSTRAP_ADMIN_LASTNAME:}
    admin-email: ${HONCHO_BOOTSTRAP_ADMIN_EMAIL:}
  # Audit retention. AuditLogDao entries older than retention-days are purged
  # daily at purge-cron (default 03:00 local). If row count exceeds max-rows,
  # the oldest entries are purged until the cap is satisfied.
  audit:
    retention-days: ${HONCHO_AUDIT_RETENTION_DAYS:90}
    max-rows: ${HONCHO_AUDIT_MAX_ROWS:1000000}
    purge-cron: ${HONCHO_AUDIT_PURGE_CRON:0 0 3 * * *}

# CORS allowed origins. Comma-separated list.
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

# Session config. ttl-minutes=0 means sessions never expire (current in-memory behavior).
session:
  ttl-minutes: ${SESSION_TTL_MINUTES:0}

logging:
  level:
    com.revytechinc.honchoinspector: INFO
    org.springframework.web: INFO

# Actuator. The /actuator/metrics/http.server.requests endpoint
# gives per-URI request count + latency histograms — the operator's
# "frequency and average time per endpoint" stat. We expose only the
# minimum needed for that:
#   - health: liveness/readiness for systemd + future load balancers
#   - info: build/git info
#   - metrics: the per-endpoint frequency + latency stats
#   - prometheus: scrape-friendly format (handy for monitoring)
# Everything else (env, beans, mappings, threaddump, heapdump, etc.)
# is intentionally NOT exposed — they leak secrets and config.
# The backend binds to 127.0.0.1 (see systemd unit), so the metrics
# surface is only reachable from the same host, never the public
# network. The /actuator/metrics endpoint can be hit directly by the
# operator for ad-hoc checks, or scraped by Prometheus on the same
# host.
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
    metrics:
      tags:
        application: ${spring.application.name}
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 50ms, 100ms, 250ms, 500ms, 1s, 2s
