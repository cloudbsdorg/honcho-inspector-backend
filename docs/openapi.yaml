  # =========================================================================
  # Admin surface (Phase 4 — implemented; was sketched in Phase 1)
  # =========================================================================
  # All paths under /api/admin/** require an X-Session-Id header whose
  # session resolves to a user with isAdmin=true. Enforced centrally by
  # the @RequireAdmin annotation + AdminAuthInterceptor HandlerInterceptor.
  # Unauthenticated callers get 401; authenticated non-admins get 403.
  # There is no per-controller opt-in helper. See README §"Admin API" and
  # docs/SECURITY.md §2.
  /api/admin/users:
    get:
      tags:
      - admin
      summary: List users (paginated)
      description: 'Paginated user list. `?pageSize=10|20|30|ALL`, defaults to 20.

        Returns `UserResponse` items (no `passwordHash` is ever returned).

        Admin-only.

        '
      operationId: list_1
      parameters:
      - name: page
        in: query
        description: Page index (0-based)
        schema:
          type: integer
          default: 0
          minimum: 0
      - name: pageSize
        in: query
        description: 'Page size: 10, 20, 30, or ALL (case-insensitive).'
        schema:
          type: string
          default: '20'
          enum:
          - '10'
          - '20'
          - '30'
          - ALL
      responses:
        '200':
          description: Page of users
          content:
            '*/*':
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserResponse'
                  total:
                    type: integer
                  page:
                    type: integer
                  rows:
                    type: integer
                  pages:
                    type: integer
        '401':
          description: Not authenticated
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Caller is not admin
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
