# ============================================================================
# Honcho Inspector Backend - Hand-written OpenAPI contract.
#
# This file is the canonical OpenAPI document for the backend. The live
# Swagger UI (served at /swagger-ui.html on a running instance) and the
# /v3/api-docs JSON endpoint both render the same shape via springdoc.
#
# Drift policy: the springdoc-generated snapshot in
# docs/openapi.generated.json is compared against this file by the
# OpenApiDriftCheckTest. The hand-written file is allowed to have richer
# `description` fields and the `x-workflow-narrative` top-level extension
# (which the snapshot will not have). Every path, method, operationId,
# tag, parameter, requestBody shape, and response key MUST match.
# ============================================================================

openapi: 3.0.3
info:
  title: Honcho Inspector Backend
  version: 0.1.0
  description: 'Backend for the Honcho Inspector admin surface.


    Sits between the Angular UI and one or more Honcho instances. Keeps

    the Honcho API key off the browser, externalizes config per-OS

    convention, and serves a multi-user multi-profile admin surface

    (one SQLite DB, no external service to run).


    ## Authentication


    This API does NOT use JWT or OAuth2 Bearer tokens. Every authenticated

    request must carry the `X-Session-Id` header whose value is the opaque

    session id returned by `POST /api/auth/login`. The session id is a

    24-byte random hex string stored server-side; send it verbatim on every

    subsequent request. `POST /api/auth/logout` invalidates it.


    Honcho proxy endpoints additionally require the `X-Honcho-Profile-Id`

    header to pick which encrypted profile (base URL + API key + workspace)

    the request is routed to.


    See `x-workflow-narrative` at the root of this document for the

    recommended end-to-end flow.


    Live Swagger UI: <http://localhost:8080/swagger-ui.html>

    '
  contact:
    name: Honcho Inspector maintainers
    url: https://github.com/cloudbsdorg/honcho-inspector-backend
  license:
    name: BSD-3-Clause
    url: https://opensource.org/licenses/BSD-3-Clause
servers:
- url: http://localhost:8080
  description: Local dev via `mvn spring-boot:run`
- url: https://inspector.example.com
  description: Production, behind a TLS-terminating reverse proxy
  x-notes: 'Replace with the operator-provided public URL. The backend listens

    on plain HTTP and MUST sit behind a TLS-terminating reverse proxy

    in any internet-reachable environment. See `docs/reverse-proxy.md`

    for ready-to-use nginx, Apache, and Caddy configurations.

    '
tags:
- name: auth
  description: 'User registration, login, logout, and session lookup. Public

    endpoints (no `X-Session-Id` required) plus `/api/auth/me` and

    `/api/auth/logout` which require it.

    '
- name: profiles
  description: 'CRUD for Honcho profiles owned by the current user. Each profile

    stores an encrypted API key, base URL, workspace id, and Honcho

    user name.

    '
- name: honcho-proxy
  description: 'Pass-through proxy to the Honcho v3 REST API. Every endpoint

    requires `X-Session-Id` AND `X-Honcho-Profile-Id`. Requests are

    forwarded with the profile''s decrypted API key attached as

    `Authorization: Bearer <apiKey>`.

    '
- name: admin
  description: 'Reserved for future admin-only endpoints (user management, audit

    log, etc.). Currently empty, kept here so the OpenAPI tag catalogue

    is stable across releases.

    '
paths:
  # -----------------------------------------------------------------------
  # Health (public)
  # -----------------------------------------------------------------------
  /api/health:
    get:
      tags:
      - auth
      summary: Liveness / readiness probe
      description: 'Public unauthenticated health endpoint. Returns counts of users,

        sessions, and profiles, plus a `needsRegister` boolean the UI uses

        to decide whether to show the registration form on first run.

        '
      operationId: health
      responses:
        '200':
          description: Service is up
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/auth/register:
    post:
      tags:
      - auth
      summary: Register a new user
      description: 'Creates a new user account. The first user to register on a

        fresh database is automatically promoted to admin. Subsequent

        registrations are non-admin.


        Workflow step 1 of the recommended end-to-end flow. After this

        call, immediately call `POST /api/auth/login` to obtain a

        session id.

        '
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialsInput'
      responses:
        '201':
          description: User created
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Validation error (e.g. password too short)
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Username already exists
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/login:
    post:
      tags:
      - auth
      summary: Log in and obtain a session id
      description: 'Validates username and password and, on success, returns a fresh

        session id. Send it back on every subsequent request as the

        `X-Session-Id` header.


        Workflow step 2 of the recommended end-to-end flow. Returns 401

        on invalid credentials without revealing whether the username

        exists.

        '
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialsInput'
      responses:
        '200':
          description: Authenticated, session id returned
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid username or password
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/logout:
    post:
      tags:
      - auth
      summary: Invalidate the current session
      description: 'Reads the `X-Session-Id` header, deletes the session server-side,

        and returns 200 with `{ok: true}`. Idempotent: calling with a

        missing or unknown session id is a no-op success.

        '
      operationId: logout
      responses:
        '200':
          description: Session invalidated (or already absent)
          content:
            '*/*':
              schema:
                type: object
                example:
                  ok: true
  /api/auth/me:
    get:
      tags:
      - auth
      summary: Get the currently authenticated user
      description: 'Returns the user record for the session identified by the

        `X-Session-Id` header. Useful on app reload to re-hydrate the UI.


        Workflow step 3 of the recommended end-to-end flow.

        '
      operationId: me
      responses:
        '200':
          description: Current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          description: No valid session
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  # -----------------------------------------------------------------------
  # Profiles (CRUD on Honcho profiles owned by the current user)
  # -----------------------------------------------------------------------
  /api/profiles:
    get:
      tags:
      - profiles
      summary: List the current user's profiles
      description: 'Returns all profiles owned by the user identified by the

        `X-Session-Id` header. The encrypted API key blob is included

        for each; use `/reveal` to obtain the plaintext.

        '
      operationId: list
      responses:
        '200':
          description: Profiles (may be empty)
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Profile'
    post:
      tags:
      - profiles
      summary: Create a new profile
      description: 'Creates a profile owned by the current user. The plaintext API

        key in the body is encrypted immediately and never returned in

        this response. Call `/reveal` if you need it back.


        Workflow step 4 of the recommended end-to-end flow.

        '
      operationId: create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileCreateInput'
      responses:
        '201':
          description: Profile created
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Profile'
        '400':
          description: Validation error
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/profiles/{id}:
    get:
      tags:
      - profiles
      summary: Fetch a single profile by id
      description: 'Returns the profile record (encrypted API key blob included).

        Returns 404 if the id does not exist OR belongs to a different

        user. The response is identical in both cases to avoid leaking

        ownership.

        '
      operationId: get
      parameters: &id001
      - name: id
        in: path
        description: Hex profile id
        required: true
        schema:
          type: string
        example: p1q2r3s4t5u6v7w8
      responses:
        '200':
          description: Profile found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Profile'
        '404':
          description: Profile not found or not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    put:
      tags:
      - profiles
      summary: Update a profile (partial)
      description: 'Updates only the fields present in the body. Passing a new

        `apiKey` re-encrypts and overwrites the stored blob; omitting

        it leaves the existing key intact.

        '
      operationId: update
      parameters: *id001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProfileUpdateInput'
      responses:
        '200':
          description: Profile updated
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/Profile'
        '404':
          description: Profile not found or not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - profiles
      summary: Delete a profile
      description: 'Removes the profile. Returns 204 on success and 404 if the id

        does not exist or is not owned by the current user.

        '
      operationId: delete
      parameters: *id001
      responses:
        '204':
          description: Profile deleted
        '404':
          description: Profile not found or not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/profiles/{id}/reveal:
    get:
      tags:
      - profiles
      summary: Decrypt and return the profile's API key
      description: 'Decrypts the stored API key blob and returns it alongside the

        profile record. Use sparingly; the plaintext key should only

        be exposed when the UI needs to display or copy it.

        '
      operationId: reveal
      parameters:
      - name: id
        in: path
        description: Hex profile id
        required: true
        schema:
          type: string
        example: p1q2r3s4t5u6v7w8
      responses:
        '200':
          description: Plaintext key returned
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ProfileWithKey'
        '404':
          description: Profile not found or not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/profiles/{id}/test:
    post:
      tags:
      - profiles
      summary: Test that the profile can reach Honcho
      description: 'Decrypts the API key, builds an `Authorization: Bearer <apiKey>`

        header, and issues a `GET /v3/workspaces/{workspaceId}` against

        the profile''s `baseUrl`. Returns `{ok: true, message: "reachable"}`

        on success or `{ok: false, error: <msg>}` on any HTTP or transport

        failure.


        Workflow step 5 of the recommended end-to-end flow.

        '
      operationId: test
      parameters:
      - name: id
        in: path
        description: Hex profile id
        required: true
        schema:
          type: string
        example: p1q2r3s4t5u6v7w8
      responses:
        '200':
          description: Result of the connectivity check
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ProfileTestResult'
        '404':
          description: Profile not found or not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  # -----------------------------------------------------------------------
  # Honcho proxy - peers
  # -----------------------------------------------------------------------
  /api/peers:
    get:
      tags:
      - honcho-proxy
      summary: List peers in the active workspace
      description: 'Proxies `GET /v3/workspaces/{workspaceId}/peers`. Any query

        parameters on the inbound request are forwarded to Honcho as-is.

        '
      operationId: listPeers
      responses:
        '200':
          description: Page of peers from Honcho (Honcho v3 `Page[T]` envelope)
          content:
            '*/*':
              schema:
                type: object
        '400':
          description: Missing `X-Honcho-Profile-Id` header
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Profile not found / not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
      - honcho-proxy
      summary: Create a peer in the active workspace
      description: 'Proxies `POST /v3/workspaces/{workspaceId}/peers`. The request

        body is forwarded to Honcho unchanged.

        '
      operationId: createPeer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Honcho response body (created peer)
          content:
            '*/*':
              schema:
                type: object
        '400':
          description: Missing `X-Honcho-Profile-Id` header
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Profile not found / not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/peers/{peerId}/card:
    get:
      tags:
      - honcho-proxy
      summary: Get a peer's card
      description: 'Proxies `GET /v3/workspaces/{workspaceId}/peers/{peerId}/card`.

        Returns the peer''s peer card as an array of fact strings.

        '
      operationId: peerCard
      parameters: &id002
      - name: peerId
        in: path
        description: Honcho peer id
        required: true
        schema:
          type: string
        example: alice
      responses:
        '200':
          description: Honcho peer card (string facts)
          content:
            '*/*':
              schema:
                type: object
        '400':
          description: Missing `X-Honcho-Profile-Id` header
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Profile not found / not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
      - honcho-proxy
      summary: Replace a peer's card
      description: 'Proxies `POST /v3/workspaces/{workspaceId}/peers/{peerId}/card`.

        The body (an array of fact strings) is forwarded to Honcho.

        '
      operationId: updatePeerCard
      parameters: *id002
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Honcho response
          content:
            '*/*':
              schema:
                type: object
        '400':
          description: Missing `X-Honcho-Profile-Id` header
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Profile not found / not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/peers/{peerId}/representation:
    get:
      tags:
      - honcho-proxy
      summary: Get a peer's representation
      description: 'Proxies `GET /v3/workspaces/{workspaceId}/peers/{peerId}/representation`.

        Returns a Honcho-formatted text representation of what the peer

        knows or believes.

        '
      operationId: peerRepresentation
      parameters:
      - name: peerId
        in: path
        description: Honcho peer id
        required: true
        schema:
          type: string
        example: alice
      responses:
        '200':
          description: Honcho representation string
          content:
            '*/*':
              schema:
                type: object
        '400':
          description: Missing `X-Honcho-Profile-Id` header
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Profile not found / not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/peers/{peerId}/chat:
    post:
      tags:
      - honcho-proxy
      summary: Chat with a peer
      description: 'Proxies `POST /v3/workspaces/{workspaceId}/peers/{peerId}/chat`.

        Body forwarded to Honcho unchanged.

        '
      operationId: peerChat
      parameters:
      - name: peerId
        in: path
        description: Honcho peer id
        required: true
        schema:
          type: string
        example: alice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Honcho chat response
          content:
            '*/*':
              schema:
                type: object
        '400':
          description: Missing `X-Honcho-Profile-Id` header
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Profile not found / not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/peers/{peerId}/search:
    post:
      tags:
      - honcho-proxy
      summary: Semantic search across a peer's messages
      description: 'Proxies `POST /v3/workspaces/{workspaceId}/peers/{peerId}/search`.

        Body forwarded to Honcho unchanged.

        '
      operationId: peerSearch
      parameters:
      - name: peerId
        in: path
        description: Honcho peer id
        required: true
        schema:
          type: string
        example: alice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Honcho search results
          content:
            '*/*':
              schema:
                type: object
        '400':
          description: Missing `X-Honcho-Profile-Id` header
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Profile not found / not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/peers/{peerId}/conclusions:
    get:
      tags:
      - honcho-proxy
      summary: List a peer's conclusions
      description: 'Proxies `GET /v3/workspaces/{workspaceId}/peers/{peerId}/conclusions`.

        Query params (e.g. `limit`, `page`) forwarded to Honcho.

        '
      operationId: peerConclusions
      parameters:
      - name: peerId
        in: path
        description: Honcho peer id
        required: true
        schema:
          type: string
        example: alice
      responses:
        '200':
          description: Page of conclusions from Honcho
          content:
            '*/*':
              schema:
                type: object
        '400':
          description: Missing `X-Honcho-Profile-Id` header
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Profile not found / not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/peers/{peerId}/sessions:
    get:
      tags:
      - honcho-proxy
      summary: List sessions a peer participates in
      description: 'Proxies `GET /v3/workspaces/{workspaceId}/peers/{peerId}/sessions`.

        Query params forwarded to Honcho.

        '
      operationId: peerSessions
      parameters:
      - name: peerId
        in: path
        description: Honcho peer id
        required: true
        schema:
          type: string
        example: alice
      responses:
        '200':
          description: Page of sessions from Honcho
          content:
            '*/*':
              schema:
                type: object
        '400':
          description: Missing `X-Honcho-Profile-Id` header
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Profile not found / not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/peers/{peerId}/conclusions/query:
    post:
      tags:
      - honcho-proxy
      summary: Semantic query over a peer's conclusions
      description: 'Proxies `POST /v3/workspaces/{workspaceId}/peers/{peerId}/conclusions/query`.

        Body forwarded to Honcho unchanged.

        '
      operationId: peerConclusionsQuery
      parameters:
      - name: peerId
        in: path
        description: Honcho peer id
        required: true
        schema:
          type: string
        example: alice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Honcho query response
          content:
            '*/*':
              schema:
                type: object
        '400':
          description: Missing `X-Honcho-Profile-Id` header
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Profile not found / not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  # -----------------------------------------------------------------------
  # Honcho proxy - sessions
  # -----------------------------------------------------------------------
  /api/sessions:
    get:
      tags:
      - honcho-proxy
      summary: List sessions in the active workspace
      description: 'Proxies `GET /v3/workspaces/{workspaceId}/sessions`. Query params

        forwarded to Honcho.

        '
      operationId: listSessions
      responses:
        '200':
          description: Page of sessions from Honcho
          content:
            '*/*':
              schema:
                type: object
        '400':
          description: Missing `X-Honcho-Profile-Id` header
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Profile not found / not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
      - honcho-proxy
      summary: Create a session
      description: 'Proxies `POST /v3/workspaces/{workspaceId}/sessions`. Body

        forwarded to Honcho unchanged.

        '
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Honcho response (created session)
          content:
            '*/*':
              schema:
                type: object
        '400':
          description: Missing `X-Honcho-Profile-Id` header
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Profile not found / not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{sessionId}:
    get:
      tags:
      - honcho-proxy
      summary: Get a session by id
      description: 'Proxies `GET /v3/workspaces/{workspaceId}/sessions/{sessionId}`.

        '
      operationId: getSession
      parameters: &id003
      - name: sessionId
        in: path
        description: Honcho session id
        required: true
        schema:
          type: string
        example: sess_abc123
      responses:
        '200':
          description: Honcho session record
          content:
            '*/*':
              schema:
                type: object
        '400':
          description: Missing `X-Honcho-Profile-Id` header
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Profile not found / not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - honcho-proxy
      summary: Delete a session
      description: 'Proxies `DELETE /v3/workspaces/{workspaceId}/sessions/{sessionId}`.

        '
      operationId: deleteSession
      parameters: *id003
      responses:
        '200':
          description: Honcho response (typically empty on success)
          content:
            '*/*':
              schema:
                type: object
        '400':
          description: Missing `X-Honcho-Profile-Id` header
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Profile not found / not owned by current user
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sessions/{sessionId}/messages:
    get:
      tags:
      - honcho-proxy
      summary: List messages in a session
      description: 'Proxies `GET /v3/workspaces/{workspaceId}/sessions/{sessionId}/messages`.

        Query params (e.g. `limit`, `page`) forwarded to Honcho.

        '
      operationId: listMessages
      parameters: &id004
      - name: sessionId
        in: path
        description: Honcho session id
        required: true
        schema:
          type: string
        example: sess_abc123
      responses:
        '200':
          description: Page of messages from Honcho
          content:
            '*/*':
              schema:
                type: object
        '400':
