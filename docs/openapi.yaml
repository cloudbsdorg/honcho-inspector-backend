                properties:
                  ageDeleted:
                    type: integer
                  sizeDeleted:
                    type: integer
                  totalDeleted:
                    type: integer
                  retentionDays:
                    type: integer
                  maxRows:
                    type: integer
                  ranAt:
                    type: string
  /api/admin/maintenance/sessions/purge-expired:
    post:
      tags:
      - admin
      summary: Manually sweep expired auth_sessions
      operationId: purgeExpiredSessions
      responses:
        '200':
          description: Number of expired sessions deleted
          content:
            '*/*':
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                  ranAt:
                    type: string
components:
  schemas:
    # ------------------------------------------------------------------
    # Public auth DTOs
    # ------------------------------------------------------------------
    CredentialsInput:
      type: object
      description: 'Username and password payload shared by `/api/auth/register`

        and `/api/auth/login`.

        '
      required:
      - username
      - password
      properties:
        username:
          type: string
          description: Unique username (case-sensitive on the wire). Required.
          example: alice
        password:
          type: string
          minLength: 8
          description: 'Plaintext password. Minimum 8 characters. Hashed with bcrypt

            cost 12 server-side; never logged.

            '
          example: correct horse battery staple
      example:
        username: alice
        password: correct horse battery staple
    UserResponse:
      type: object
      description: 'Public view of a registered user. The password hash is never

        returned. Returned by `/api/auth/me`, `/api/auth/login`, and every

        `/api/admin/users/*` path. `firstname`, `lastname`, and `email`

        are optional (nullable in the schema; absent from the wire

        response when unset).

        '
      properties:
        id:
          type: string
          description: Opaque hex user id
          example: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
        username:
          type: string
          description: Unique username (case-sensitive on the wire)
          example: alice
        firstname:
          type: string
          description: Optional first name
          example: Alice
          nullable: true
        lastname:
          type: string
          description: Optional last name
          example: Admin
          nullable: true
        email:
          type: string
          description: Optional email (unique when set)
          example: alice@example.com
          nullable: true
        isAdmin:
          type: boolean
          description: '`true` for users with admin role. Set at create-time

            only; promoted/demoted via `PUT /api/admin/users/{id}`. There

            is no self-service promotion.

            '
          example: true
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 instant the user was created
          example: 2026-06-17 22:00:00+00:00
      example:
        id: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
        username: alice
        firstname: Alice
        lastname: Admin
        email: alice@example.com
        isAdmin: true
        createdAt: 2026-06-17 22:00:00+00:00
    LoginResponse:
      type: object
      description: 'Returned by `POST /api/auth/login` and `POST /api/auth/register`

        (register omits the sessionId). The `sessionId` is the value to

        send in the `X-Session-Id` header on every subsequent request.

        '
      properties:
        sessionId:
          type: string
          description: 'Opaque 24-byte hex session id. Send verbatim in the

            `X-Session-Id` request header.

            '
          example: 5f4dcc3b5aa765d61d8327deb882cf99
        user:
          $ref: '#/components/schemas/UserResponse'
      example:
        sessionId: 5f4dcc3b5aa765d61d8327deb882cf99
        user:
          id: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
          username: alice
          isAdmin: true
          createdAt: 2026-06-17 22:00:00+00:00
    # ------------------------------------------------------------------
    # Profile DTOs
    # ------------------------------------------------------------------
    Profile:
      type: object
      description: 'A Honcho profile owned by a user. The API key is stored

        encrypted at rest; the public API returns only the opaque

        `apiKeyEncrypted` blob. The plaintext key is exposed

        exclusively through `GET /api/profiles/{id}/reveal`.

        '
      properties:
        id:
          type: string
          description: Opaque hex profile id
          example: p1q2r3s4t5u6v7w8
        userId:
          type: string
          description: Opaque hex id of the owning user
          example: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
        label:
          type: string
          description: Human-readable label shown in the UI
          example: Production
        apiKeyEncrypted:
          type: string
          description: 'Encrypted (AES-256-GCM) Honcho API key blob. Use

            `GET /api/profiles/{id}/reveal` to obtain the plaintext.

            '
          example: enc:v1:YWFhYWFhYWFhYWFhYWFhYQ==:MTIzNDU2Nzg5
        baseUrl:
          type: string
          description: 'Honcho base URL, with no trailing `/mcp` (the proxy strips

            it if present).

            '
          example: https://api.honcho.dev
        workspaceId:
          type: string
          description: Honcho workspace id this profile is scoped to
          example: ws_abc123
        honchoUserName:
          type: string
          description: 'Honcho-side user name sent in the `X-Honcho-User-Name`

            header on every proxied request.

            '
          example: alice
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 instant the profile was created
          example: 2026-06-17 22:00:00+00:00
        updatedAt:
          type: string
          format: date-time
          description: ISO-8601 instant the profile was last updated
          example: 2026-06-17 22:00:00+00:00
        apiVersion:
          type: string
          nullable: true
          description: 'Honcho API surface version this profile targets (e.g.

            `v2`, `v3`). Nullable: profiles created before T16 lack

            this value and the controller falls back to the server

            default. Honcho v3 is the product default.

            '
          example: v3
      example:
        id: p1q2r3s4t5u6v7w8
        userId: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
        label: Production
        apiKeyEncrypted: enc:v1:YWFhYWFhYWFhYWFhYWFhYQ==:MTIzNDU2Nzg5
        baseUrl: https://api.honcho.dev
        workspaceId: ws_abc123
        honchoUserName: alice
        createdAt: 2026-06-17 22:00:00+00:00
        updatedAt: 2026-06-17 22:00:00+00:00
    ProfileCreateInput:
      type: object
      description: 'Body for `POST /api/profiles`. The API key is encrypted with

        AES-256-GCM server-side immediately upon receipt; only the

        encrypted blob is ever persisted.

        '
      required:
      - label
      - apiKey
      - baseUrl
      - workspaceId
      - honchoUserName
      properties:
        label:
          type: string
          description: Human-readable label shown in the UI
          example: Production
        apiKey:
          type: string
          description: 'Plaintext Honcho API key. Encrypted at rest with

            AES-256-GCM; never returned in subsequent list/get

            responses.

            '
          example: hmc_5f4dcc3b5aa765d61d8327deb882cf99
        baseUrl:
          type: string
          description: 'Honcho base URL, with no trailing slash. A trailing `/mcp`

            is stripped automatically by the proxy.

            '
          example: https://api.honcho.dev
        workspaceId:
          type: string
          description: Honcho workspace id this profile is scoped to
          example: ws_abc123
        honchoUserName:
          type: string
          description: 'Honcho-side user name sent in the `X-Honcho-User-Name`

            header on every proxied request.

            '
          example: alice
        apiVersion:
          type: string
          nullable: true
          description: 'Honcho API version this profile targets (e.g. `v2`, `v3`).

            Optional; null/blank falls back to the server default

            (`honcho.api-version`, `v3`).

            '
          example: v3
      example:
        label: Production
        apiKey: hmc_5f4dcc3b5aa765d61d8327deb882cf99
        baseUrl: https://api.honcho.dev
        workspaceId: ws_abc123
        honchoUserName: alice
    ProfileUpdateInput:
      type: object
      description: 'Body for `PUT /api/profiles/{id}`. Every field is optional;

        only the fields present in the JSON are written. Re-encrypting

        the API key is allowed (pass a new plaintext value).

        '
      properties:
        label:
          type: string
          description: New label, or null to leave unchanged
          example: Production (US-East)
        apiKey:
          type: string
          description: 'New plaintext API key, or null to leave unchanged.

            Re-encrypted on write.

            '
          example: hmc_NEWKEY
        baseUrl:
          type: string
          description: New base URL, or null to leave unchanged
          example: https://api.honcho.dev
        workspaceId:
          type: string
          description: New workspace id, or null to leave unchanged
          example: ws_abc123
        honchoUserName:
          type: string
          description: New Honcho user name, or null to leave unchanged
          example: alice
        apiVersion:
          type: string
          nullable: true
          description: New Honcho API version, or null to leave unchanged.
          example: v3
      example:
        label: Production (US-East)
        apiKey: hmc_NEWKEY
    ProfileWithKey:
      type: object
      description: 'Returned only by `GET /api/profiles/{id}/reveal`. Carries the

        plaintext API key; use sparingly and only when the UI needs

        to display it.

        '
      properties:
        profile:
          $ref: '#/components/schemas/Profile'
        apiKey:
          type: string
          description: Plaintext Honcho API key (decrypted server-side)
          example: hmc_5f4dcc3b5aa765d61d8327deb882cf99
      example:
        profile:
          id: p1q2r3s4t5u6v7w8
          userId: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
          label: Production
          apiKeyEncrypted: enc:v1:YWFhYWFhYWFhYWFhYWFhYQ==:MTIzNDU2Nzg5
          baseUrl: https://api.honcho.dev
          workspaceId: ws_abc123
          honchoUserName: alice
          createdAt: 2026-06-17 22:00:00+00:00
          updatedAt: 2026-06-17 22:00:00+00:00
        apiKey: hmc_5f4dcc3b5aa765d61d8327deb882cf99
    ProfileTestResult:
      type: object
      description: 'Result of `POST /api/profiles/{id}/test`. The proxy attempts a

        `GET /v3/workspaces/{workspaceId}` against the profile''s

        `baseUrl` with the decrypted API key.

        '
      properties:
        ok:
          type: boolean
          description: True when the upstream Honcho call succeeded
          example: true
        message:
          type: string
          description: Short human-readable status (e.g. `reachable`)
          example: reachable
        error:
          type: string
          description: 'Present only when `ok` is false; carries the upstream

            error message verbatim.

            '
          example: connection refused
      example:
        ok: true
        message: reachable
    # ------------------------------------------------------------------
    # Honcho proxy shapes
    # ------------------------------------------------------------------
    DreamRequest:
      type: object
      description: 'Body for `POST /api/dream`. The proxy reads `peerId` from the

        body to construct the upstream v3 path

        `…/peers/{peerId}/dreams` and forwards the rest of the body

        to Honcho unchanged.

        '
      required:
      - peerId
      properties:
        peerId:
          type: string
          description: Honcho peer id whose dreams to schedule
          example: alice
      example:
        peerId: alice
    HonchoPage:
      type: object
      description: 'Generic Honcho v3 `Page[T]` envelope. The proxy returns Honcho

        payloads as-is for list endpoints (peers, sessions, messages,

        conclusions, etc.), so this shape describes the upstream

        contract without making client generators produce a per-resource

        page schema.

        '
      properties:
        items:
          type: array
          description: Page of results
          items:
            type: object
        total:
          type: integer
          description: Total number of items across all pages
          example: 137
        page:
          type: integer
          description: Current page index (1-based)
          example: 1
        size:
          type: integer
          description: Page size used for this request
          example: 50
      example:
        items: []
        total: 137
        page: 1
        size: 50
    # ------------------------------------------------------------------
    # Misc
    # ------------------------------------------------------------------
    ErrorResponse:
      type: object
      description: 'Generic error envelope returned for non-2xx responses. The

        `error` field carries a short human-readable message suitable

        for surfacing in the UI; it is not localized and not intended

        for programmatic branching.

        '
      properties:
        error:
          type: string
      example:
        error: invalid username or password
    HealthResponse:
      type: object
      description: 'Body returned by `GET /api/health`. Returns only `ok` and

        `needs_register`. Aggregate user / session / profile counts are

        intentionally NOT exposed on this unauthenticated probe (they

        are available to admins via `/api/admin/dashboard/overview`).

        '
      properties:
        ok:
          type: boolean
          description: Always true when the service is up
          example: true
        needs_register:
          type: boolean
          description: 'True on a fresh database (no users yet). UI uses this to

            show the registration form before the login form. With the

            admin-gated register endpoint, the first admin is normally

            created by `AdminBootstrap` from the drop-in config; this

            flag is useful for operators verifying bootstrap wiring.

            '
          example: false
      example:
        ok: true
        needs_register: false
    # ------------------------------------------------------------------
    # Admin RBAC DTOs
    # ------------------------------------------------------------------
    AdminCreateUserInput:
      type: object
      description: 'Create-user payload. Required: `username`, `password` (>=8

        chars). Optional: `firstname`, `lastname`, `email`, `isAdmin`.

        Admin-only; called via `POST /api/admin/users`.

        '
      required:
      - username
      - password
      properties:
        username:
          type: string
          example: alice
        password:
          type: string
          format: password
          minLength: 8
          example: correct horse battery staple
        firstname:
          type: string
          nullable: true
          example: Alice
        lastname:
          type: string
          nullable: true
          example: Liddell
        email:
          type: string
          format: email
          nullable: true
          example: alice@example.com
        isAdmin:
          type: boolean
          description: '`true` to create this user with admin role. Defaults to

            false when omitted.

            '
          default: false
          example: false
      example:
        username: alice
        password: correct horse battery staple
        firstname: Alice
        lastname: Liddell
        email: alice@example.com
        isAdmin: false
    AdminUpdateUserInput:
      type: object
      description: 'Update-user payload. Omitted fields are unchanged. `isAdmin`

        is tri-state: omit to leave the role alone, set to `true` to

        promote, set to `false` to demote. The last remaining admin

        cannot be demoted (server returns 409).

        '
      properties:
        username:
          type: string
          example: alice
        firstname:
          type: string
          nullable: true
        lastname:
          type: string
          nullable: true
        email:
          type: string
          format: email
          nullable: true
        isAdmin:
          type: boolean
          description: '`true` to promote, `false` to demote, omitted to leave

            the role unchanged.

            '
    AdminPasswordResetInput:
      type: object
      description: 'Password reset payload. New password must be at least 8

        characters. Successful reset revokes all of the target user''s

        existing auth sessions (force-logout).

        '
      required:
      - newPassword
      properties:
        newPassword:
          type: string
          format: password
          minLength: 8
          example: correct horse battery staple
      example:
        newPassword: correct horse battery staple
    # ------------------------------------------------------------------
    # Audit + auth session (documented in narrative only; the controllers
    # return anon-style inline objects, so the springdoc-generated
    # snapshot does not emit them. Listed here so client code generators
    # have the field set to import.)
    # ------------------------------------------------------------------
    AuditEntry:
      type: object
      description: 'One row of the `audit_log` table, returned by `GET

        /api/admin/audit`. `metadata` is a free-form JSON object whose

        shape depends on `action`.

        '
      properties:
        id:
          type: integer
          description: Monotonic audit-log id
          example: 42
        actorUserId:
          type: string
          nullable: true
          description: Hex user id of the actor; null for the bootstrap path
        action:
          type: string
          description: '`user.bootstrap`, `user.create`, `user.update`, `user.delete`,
            `user.sessions.revoke`, `user.password.reset`, `audit.purge`,
            `sessions.purge`'
          example: user.create
        targetUserId:
          type: string
          nullable: true
          description: Hex user id of the target; null for non-user actions
        targetResource:
          type: string
          nullable: true
          description: Optional resource identifier (e.g. "audit_log", "auth_sessions")
        ip:
          type: string
          nullable: true
          description: Source IP recorded at audit time
        sessionId:
          type: string
          nullable: true
          description: Hex auth session id of the actor; null for bootstrap
        metadata:
          type: object
          additionalProperties: true
          description: Free-form action-specific JSON
        createdAt:
          type: string
          format: date-time
          description: ISO-8601 instant the audit row was written
      example:
        id: 42
        actorUserId: a1b2c3d4e5f6a1b2c3d4e5f6a1b2c3d4
        action: user.create
        targetUserId: f0e1d2c3b4a59687
        targetResource: null
        ip: 10.0.0.1
        sessionId: 5f4dcc3b5aa765d61d8327deb882cf99
        metadata:
          username: bob
          isAdmin: false
        createdAt: 2026-06-21T20:00:00Z
    AuthSession:
      type: object
      description: 'One row of the `auth_sessions` table, returned by `GET

        /api/admin/users/{id}/sessions`.

        '
      properties:
        id:
          type: string
          description: Hex session id (the value sent in `X-Session-Id`)
        userId:
          type: string
          description: Hex user id of the owner
        createdAt:
          type: string
          format: date-time
        lastSeenAt:
          type: string
          format: date-time
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: 'ISO-8601 instant; null when `SESSION_TTL_MINUTES=0` (never
            expire)'
        ip:
          type: string
          nullable: true
# ----------------------------------------------------------------------------
# Top-level workflow narrative - the recommended end-to-end flow.
# ----------------------------------------------------------------------------
x-workflow-narrative: "## Recommended end-to-end workflow\n\nPhase 1 ships a single-user-per-profile multi-profile backend.\
  \ The\nhappy path below is the canonical sequence; the UI follows the same\norder. Every step requires the headers from\
  \ the previous steps to be\nin place.\n\n### Step 1 — Register the first user\n`POST /api/auth/register` with `{ username,\
  \ password }`.\n\nThe first user to register on a fresh database is automatically\npromoted to admin. Returns 201 with `{\
  \ id, username, isAdmin,\ncreatedAt }`.\n\n```bash\ncurl -X POST http://localhost:8080/api/auth/register \\\n  -H 'content-type:\
  \ application/json' \\\n  -d '{\"username\":\"alice\",\"password\":\"correct horse battery staple\"}'\n```\n\n### Step 2\
  \ — Log in to obtain a session id\n`POST /api/auth/login` with the same credentials.\n\nReturns 200 with `{ sessionId, user\
  \ }`. Store `sessionId` and send it\nback on every subsequent request as the `X-Session-Id` header. There\nis no Bearer\
  \ JWT; the API uses a custom opaque session token.\n\n```bash\ncurl -X POST http://localhost:8080/api/auth/login \\\n  -H\
  \ 'content-type: application/json' \\\n  -d '{\"username\":\"alice\",\"password\":\"correct horse battery staple\"}'\n#\
  \ {\"sessionId\":\"5f4dcc3b...\",\"user\":{...}}\n```\n\n### Step 3 — Confirm the session works\n`GET /api/auth/me` with\
  \ `X-Session-Id: <sessionId>`.\n\nReturns the current user record. Useful on app reload to re-hydrate\nthe UI without asking\
  \ the user to log in again.\n\n```bash\ncurl http://localhost:8080/api/auth/me \\\n  -H 'x-session-id: 5f4dcc3b...'\n```\n\
  \n### Step 4 — Create a Honcho profile\n`POST /api/profiles` with `{ label, apiKey, baseUrl, workspaceId,\nhonchoUserName\
  \ }` and the `X-Session-Id` header.\n\nThe plaintext `apiKey` is encrypted with AES-256-GCM server-side\nimmediately. The\
  \ response includes only the opaque\n`apiKeyEncrypted` blob. A user can own many profiles, one per\nHoncho workspace.\n\n\
  ```bash\ncurl -X POST http://localhost:8080/api/profiles \\\n  -H 'content-type: application/json' \\\n  -H 'x-session-id:\
  \ 5f4dcc3b...' \\\n  -d '{\n    \"label\": \"Production\",\n    \"apiKey\": \"hmc_5f4dcc3b5aa765d61d8327deb882cf99\",\n\
  \    \"baseUrl\": \"https://api.honcho.dev\",\n    \"workspaceId\": \"ws_abc123\",\n    \"honchoUserName\": \"alice\"\n\
  \  }'\n```\n\n### Step 5 — Verify the profile can reach Honcho\n`POST /api/profiles/{id}/test` with `X-Session-Id`.\n\n\
  Decrypts the API key, builds `Authorization: Bearer <apiKey>` and\n`X-Honcho-User-Name: <honchoUserName>`, and issues a\n\
  `GET /v3/workspaces/{workspaceId}` against the profile's `baseUrl`.\nReturns `{ ok: true, message: \"reachable\" }` on success\
  \ or\n`{ ok: false, error: <msg> }` on any HTTP or transport failure.\n\n```bash\ncurl -X POST http://localhost:8080/api/profiles/p1q2r3s4t5u6v7w8/test\
  \ \\\n  -H 'x-session-id: 5f4dcc3b...'\n```\n\n### Step 6 — Honcho proxy calls\nWith a working profile, every other endpoint\
  \ under `/api/peers`,\n`/api/sessions`, `/api/queue-status`, `/api/workspace/info`,\n`/api/search`, and `/api/dream` is\
  \ a pass-through to the profile's\nHoncho instance. Each requires both `X-Session-Id` (which user) and\n`X-Honcho-Profile-Id`\
  \ (which encrypted profile / which Honcho\nworkspace).\n\nThe typical sequence:\n\n1. `POST /api/peers` to create a peer\
  \ in the workspace.\n2. `POST /api/sessions` to create a session between peers.\n3. `POST /api/sessions/{id}/messages` to\
  \ append conversation turns.\n4. `GET /api/sessions/{id}/messages` to read the conversation back.\n5. `GET /api/sessions/{id}/context`\
  \ to fetch an LLM-ready context\n   window (with optional `tokens` and `summary` query params).\n6. `POST /api/sessions/{id}/search`\
  \ for semantic search across the\n   session's messages.\n7. `POST /api/dream` (body must include `peerId`) to schedule\n\
  \   background memory consolidation.\n8. `GET /api/queue-status` to monitor the dream/derivation backlog.\n\nAll of these\
  \ forward the request body verbatim and return the\nHoncho response body verbatim. The proxy never normalizes, validates,\n\
  or re-shapes Honcho payloads. On Honcho HTTP 4xx the proxy returns\nHoncho's status code; on 5xx and transport errors the\
  \ proxy returns\n502.\n"
x-phase-boundaries:
  phase1:
    description: 'Phase 1 (this release): auth, profiles, health, the Honcho

      v3 pass-through proxy, and the admin RBAC surface. All 42 paths

      under `/api/auth`, `/api/profiles`, `/api/health`,

      `/api/{peers,sessions,queue-status,workspace,search,dream}`, and

      `/api/admin/{users,audit,dashboard,maintenance}` are live. The

      admin surface is gated by `@RequireAdmin` +

      `AdminAuthInterceptor`; the `x-phase-boundaries.phase1.paths`

      list below enumerates every admin path. The Phase 2 stubs under

      `/api/{orgs,stats,reports,invites}` remain unimplemented.

      '
    paths:
    - /api/auth/register
    - /api/auth/login
    - /api/auth/logout
    - /api/auth/me
    - /api/health
    - /api/profiles
    - /api/profiles/{id}
    - /api/profiles/{id}/reveal
    - /api/profiles/{id}/test
    - /api/peers
    - /api/peers/{peerId}/card
    - /api/peers/{peerId}/representation
    - /api/peers/{peerId}/chat
    - /api/peers/{peerId}/search
    - /api/peers/{peerId}/conclusions
    - /api/peers/{peerId}/sessions
    - /api/peers/{peerId}/conclusions/query
    - /api/sessions
    - /api/sessions/{sessionId}
    - /api/sessions/{sessionId}/messages
    - /api/sessions/{sessionId}/context
    - /api/sessions/{sessionId}/summaries
    - /api/sessions/{sessionId}/peers
    - /api/sessions/{sessionId}/search
    - /api/queue-status
    - /api/search
