name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_live_honcho_test:
        description: 'Run live Honcho tests against the live instance'
        type: boolean
        default: false

jobs:
  test:
    name: Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: [ '25' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      - name: Verify (mvn verify)
        run: mvn -B verify

      - name: Run live Honcho tests (manual only)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_live_honcho_test == true }}
        env:
          HONCHO_LIVE_TEST: '1'
          HONCHO_LIVE_WORKSPACE_ID: ${{ secrets.HONCHO_LIVE_WORKSPACE_ID }}
          HONCHO_LIVE_URL: ${{ secrets.HONCHO_LIVE_URL }}
          HONCHO_LIVE_API_KEY: ${{ secrets.HONCHO_LIVE_API_KEY }}
        run: mvn -B verify -Dgroups=live
